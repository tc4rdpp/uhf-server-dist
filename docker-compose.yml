services:
  uhf-server:
    image: swapplications/uhf-server:1.6.0
    container_name: uhf-server
    restart: unless-stopped
    ports:
      - "${PORT:-8124}:${PORT:-8124}"
    volumes:
      - ${DATA_DIR:-/opt/uhf-server}/recordings:/recordings
      - ${DATA_DIR:-/opt/uhf-server}/db:/var/lib/uhf-server
    environment:
      - PORT=${PORT:-8124}
      - PASSWORD=${PASSWORD:-}
    command: uhf-server --port ${PORT:-8124} --recordings-dir /recordings ${PASSWORD:+--password ${PASSWORD}} --enable-commercial-detection
